version: '3.8'

networks:
  weather_network:
    driver: bridge

services:
  kafka-1:
      image: confluentinc/cp-kafka:7.5.0
      container_name: kafka-1
      networks:
        - weather_network
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: 'broker,controller'
        KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093'
        KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:9092'
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
        KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
        KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
        CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  kafka-2:
      image: confluentinc/cp-kafka:7.5.0
      container_name: kafka-2
      networks:
        - weather_network
      ports:
        - "9093:9092" 
      environment:
        KAFKA_NODE_ID: 2
        KAFKA_PROCESS_ROLES: 'broker,controller'
        KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:29093,2@kafka-2:29093'
        KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:9092'
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
        KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
        KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
        CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - weather_network 
  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
        PGADMIN_DEFAULT_PASSWORD: admin
      ports:
        - "5050:80"
      networks:
        - weather_network
      depends_on:
        - postgres
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - weather_network
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092
    depends_on:
      - kafka-1
      - kafka-2

  weather-producer:
      build:
        context: ./producer
        dockerfile: Dockerfile
      container_name: weather-producer
      depends_on:
        - kafka-1
        - kafka-2
      networks:
        - weather_network
      env_file:
        - .env  
      restart: always

  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    networks:
      - weather_network
    ports:
      - "8081:8080"
      - "7077:7077"
    user: root
    env_file:
      - .env
    volumes:
      - ./spark:/opt/spark/work-dir
    environment:
      - SPARK_MODE=master
    
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
  
  
  spark-processor:
    build: ./spark
    container_name: spark-processor
    user: root  
    networks:
      - weather_network
    depends_on:
      - spark-master
      - kafka-1
      - postgres
    volumes:
      - ./spark:/opt/spark/work-dir
    command: >
      /opt/spark/bin/spark-submit 
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,org.postgresql:postgresql:42.7.1 
      --master spark://spark-master:7077 
      /opt/spark/work-dir/process_weather.py

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    networks:
      - weather_network
    depends_on:
      - spark-master
    user: root
    env_file:
      - .env
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
    volumes:
      - ./spark:/opt/spark/work-dir
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077